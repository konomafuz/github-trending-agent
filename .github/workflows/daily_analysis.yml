name: Daily GitHub Trending Analysis

on:
  schedule:
    # Run every day at UTC 02:00
    - cron: "0 2 * * *"
  # Allow manual trigger for testing
  workflow_dispatch:

concurrency:
  group: github-trending-analysis-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_REPO: ${{ github.repository }}
          MIN_STARS: "1000"
          MAX_REPOS: "25"
          GEMINI_MAX_RETRIES: "5"
          GEMINI_RETRY_DELAY_SECONDS: "10"
          GEMINI_RETRY_MAX_SECONDS: "120"
        run: python main.py

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ web/public/data/
          # Only commit if there are staged changes (idempotent)
          if git diff --cached --quiet; then
            echo "No new report to commit (already up-to-date)."
          else
            git commit -m "chore: add trending report $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd web
          npm ci

      - name: Build frontend
        run: |
          cd web
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trending-report-${{ github.run_id }}
          path: reports/
          retention-days: 30
